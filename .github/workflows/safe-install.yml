name: safe-install

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          working-directory: '.'
          sandbox: 'false'
          fail-on-warn: 'false'
          post-comment: 'true'
          upload-profiles: 'true'
